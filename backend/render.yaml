services:
  - type: web
    name: chameleon-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: chameleon
      - key: GEMINI_API_KEY
        sync: false
      - key: EMERGENT_LLM_KEY
        value: none
